spring:
  application:
    name: project-video-platform

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 60MB
  
  datasource:
    url: jdbc:postgresql://localhost:5434/video_platform
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true
    open-in-view: false

jwt:
  secret: "change-this-secret-to-32-plus-characters-key-for-jwt-token-signature"
  expiration: 3600000

server:
  port: 8080

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  storage:
    materials-path: ${APP_MATERIALS_PATH:uploads/materials}
